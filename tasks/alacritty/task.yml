- block: 
  - name: Install pacman stuff
    community.general.pacman:
      name: 
        - alacritty
        - tmux
        - ttf-meslo-nerd
      state: latest

  - block: 
    - name: Link config file
      ansible.builtin.file:
        src: "{{ playbook_dir }}/tasks/alacritty/config/alacritty.toml"
        dest: "{{ config_path }}/alacritty.toml"
        state: link
    - name: Clone themes repo
      ansible.builtin.git:
        repo: https://github.com/alacritty/alacritty-theme
        dest: "{{ config_path }}/themes"
      become: true
      become_user: "{{ user }}"
    vars:
      home_path: "/home/{{ user }}"
      config_path: "{{ home_path }}/.config/alacritty/"
