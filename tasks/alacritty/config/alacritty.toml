[general]
import = ["~/.config/alacritty/themes/themes/tokyo_night_storm.toml"]

[window]
opacity = 0.75

[font]
size = 11

[font.bold]
family = "MesloLGS Nerd Font"
style = "Bold"

[font.bold_italic]
family = "MesloLGS Nerd Font"
style = "Bold Italic"

[font.italic]
family = "MesloLGS Nerd Font"
style = "Italic"

[font.normal]
family = "MesloLGS Nerd Font"
style = "Regular"

[terminal.shell]
args = ["-u", "new-session", "-A", "-s", "main"]
program = "/usr/bin/tmux"
